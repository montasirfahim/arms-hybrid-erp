services:
  # 1. Django ERP Web Service
  - type: web
    name: arms-hybrid-erp
    plan: free
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn proj_arms.wsgi:application"
    envVars:
      - key: DATABASE_URL
        sync: false # You will paste your existing DB URL in the Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: AI_SERVICE_URL
        value: "http://arms-ai-service:10000"
      - key: GROQ_API_KEY
        sync: false

  # 2. FastAPI AI Microservice
  - type: web
    name: arms-ai-service
    plan: free
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn ai_service.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: DATABASE_URL
        sync: false # Same DB URL as above
      - key: GROQ_API_KEY
        sync: false
      - key: DB_HOST
        value: "" 
      - key: DB_USER
        value: ""
      - key: DB_PASSWORD
        value: ""
      - key: DB_NAME
        value: ""
