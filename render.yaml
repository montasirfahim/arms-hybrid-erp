services:
  # 1. Django ERP Web Service
  - type: web
    name: arms-hybrid-erp
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn proj_arms.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: arms-db # Assumes your Render DB is named arms-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: arms-ai-service
          property: host
      - key: GROQ_API_KEY
        sync: false

  # 2. FastAPI AI Microservice
  - type: web
    name: arms-ai-service
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn ai_service.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: arms-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: DB_HOST
        value: "" # Handled by DATABASE_URL on Render
      - key: DB_USER
        value: ""
      - key: DB_PASSWORD
        value: ""
      - key: DB_NAME
        value: ""
