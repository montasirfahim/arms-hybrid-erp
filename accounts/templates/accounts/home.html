{% extends 'base.html' %}

{% block title %}Home - ARMS ERP{% endblock %}

{% block content %}
    <div class="max-w-6xl mx-auto p-8 bg-[#F0F4F8] min-h-screen">

        <!-- Top Header Section -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">All Batches</h1>

            <!-- "Create New Batch" Button -->
            <a href="{% url 'create_batch' %}" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition shadow-sm">
                <i class="fa-solid fa-plus mr-2"></i> Create New Batch
            </a>
        </div>

        <!-- Table Card -->
        <div class="bg-white rounded shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-dark-100 border-b border-gray-100">
                    <tr>
                        <th class="px-6 py-4 text-xs font-semibold text-dark-400 uppercase">Batch ID</th>
                        <th class="px-6 py-4 text-xs font-semibold text-dark-400 uppercase">Batch Name</th>
                        <th class="px-6 py-4 text-xs font-semibold text-dark-400 uppercase">Session</th>
                        <th class="px-6 py-4 text-xs font-semibold text-dark-400 uppercase text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    {% for batch in batches %}
                    <tr class="hover:bg-gray-50 transition">
                        <td class="px-6 py-4 text-gray-500">{{ batch.id }}</td>
                        <td class="px-6 py-4 text-gray-500">{{ batch.name }}</td>
                        <td class="px-6 py-4 font-medium text-gray-500">{{ batch.session }}</td>
                        <td class="px-6 py-4 text-right">
                            <a href="{% url 'batch_details' batch.id %}" class="text-blue-500 hover:text-blue-700 text-sm font-medium">View Details</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
{% endblock %}
