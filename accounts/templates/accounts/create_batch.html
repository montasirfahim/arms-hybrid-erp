{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto p-8">
    <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">Create New Batch</h1>

        <form method="post">
            {% csrf_token %}

            {% if messages %}
                <div class="mb-4">
                    {% for message in messages %}
                        {% if message.tags == 'success' %}
                            <div class="px-4 py-2 rounded bg-green-100 text-green-700">
                        {% else %}
                            <div class="px-4 py-2 rounded bg-red-100 text-red-700">
                        {% endif %}
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <!-- Styled fields for Session and Name -->
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Session</label>
                    <input type="text" name="session" value="{{ session|default:'' }}" placeholder="e.g. 2024-25" class="w-full border border-gray-200 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Batch Name</label>
                    <input type="text" name="name" value="{{ name|default:'Masters in ICT' }}" class="w-full border border-gray-200 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div class="mt-8 flex space-x-3">
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700 transition">Save Batch</button>
                <a href="{% url 'home' %}" class="px-6 py-2 text-gray-500 hover:text-gray-700 transition">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
