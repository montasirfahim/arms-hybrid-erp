{% extends 'base.html' %}

{% block title %}Login - ARMS ERP{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 px-4 py-12">
    <div class="w-full max-w-md">
        <!-- Login Card -->
        <div class="bg-white rounded-lg shadow-xl overflow-hidden">
            <!-- Header -->
            <div class="bg-gradient-to-r from-blue-600 to-blue-800 px-6 py-8">
                <h1 class="text-3xl font-bold text-white text-center">ARMS ERP</h1>
                <p class="text-blue-100 text-center mt-2">Result Management System</p>
            </div>

            <!-- Login Form -->
            <div class="px-6 py-8">
                <form id="loginForm" class="space-y-5">
                    <!-- Email Input -->
                    <div>
                        <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">
                            Email Address
                        </label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200"
                            placeholder="Enter your email"
                            required
                        />
                    </div>

                    <!-- Password Input -->
                    <div>
                        <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">
                            Password
                        </label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200"
                            placeholder="Enter your password"
                            required
                        />
                    </div>

                    <!-- Remember Me (Optional) -->
                    <div class="flex items-center">
                        <input
                            type="checkbox"
                            id="remember"
                            name="remember"
                            class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-2 focus:ring-blue-500 cursor-pointer"
                        />
                        <label for="remember" class="ml-2 text-sm text-gray-600 cursor-pointer">
                            Remember me
                        </label>
                    </div>

                    <!-- Alert Messages -->
                    <div id="alertContainer" class="hidden px-4 py-3 rounded-lg"></div>

                    <!-- Submit Button -->
                    <button
                        type="submit"
                        id="loginBtn"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition duration-200 flex items-center justify-center space-x-2"
                    >
                        <span id="btnText">Login</span>
                        <span id="spinner" class="hidden">
                            <svg class="w-5 h-5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                            </svg>
                        </span>
                    </button>
                </form>

                <!-- Additional Links -->
                <div class="mt-6 text-center">
                    <p class="text-sm text-gray-600">
                        Don't have an account?
                        <a href="#" class="text-blue-600 hover:text-blue-800 font-semibold">Contact Administrator</a>
                    </p>
                </div>
            </div>
        </div>

        <!-- Footer Info -->
        <div class="text-center mt-8 text-sm text-gray-600">
            <p>© 2024 ARMS ERP System. All rights reserved.</p>
        </div>
    </div>
</div>

<!-- JavaScript -->
<script>
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const spinner = document.getElementById('spinner');
    const alertContainer = document.getElementById('alertContainer');

    // Show alert message
    function showAlert(message, type = 'error') {
        alertContainer.className = `px-4 py-3 rounded-lg ${
            type === 'success' ? 'bg-green-100 border border-green-400 text-green-700' : 'bg-red-100 border border-red-400 text-red-700'
        }`;
        alertContainer.innerHTML = message;
        alertContainer.classList.remove('hidden');
        alertContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // Hide alert message
    function hideAlert() {
        alertContainer.classList.add('hidden');
    }

    // Handle form submission
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideAlert();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const rememberMe = document.getElementById('remember').checked;

        // Validation
        if (!email || !password) {
            showAlert('Please fill in all fields.');
            return;
        }

        if (!email.includes('@')) {
            showAlert('Please enter a valid email address.');
            return;
        }

        // Show loading state
        loginBtn.disabled = true;
        btnText.classList.add('hidden');
        spinner.classList.remove('hidden');

        try {
            // Make API request
            const response = await fetch('{% url "api_login" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    email: email,
                    password: password,
                }),
            });

            const data = await response.json();

            if (data.success) {
                // Save tokens to localStorage
                localStorage.setItem('access_token', data.access);
                localStorage.setItem('refresh_token', data.refresh);
                localStorage.setItem('user_data', JSON.stringify(data.user));

                if (rememberMe) {
                    localStorage.setItem('remember_email', email);
                }

                showAlert('Login successful! Redirecting...', 'success');

                setTimeout(() => {
                    window.location.href = '{% url "home" %}';
                }, 1000);
            } else {
                showAlert(data.message || 'Login failed. Please try again.');
                loginBtn.disabled = false;
                btnText.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        } catch (error) {
            console.error('Error:', error);
            showAlert('An error occurred. Please try again later.');
            loginBtn.disabled = false;
            btnText.classList.remove('hidden');
            spinner.classList.add('hidden');
        }
    });

    // Load remembered email on page load
    window.addEventListener('load', () => {
        const rememberedEmail = localStorage.getItem('remember_email');
        if (rememberedEmail) {
            document.getElementById('email').value = rememberedEmail;
            document.getElementById('remember').checked = true;
        }
    });

    // Utility function to get token from localStorage
    function getAuthToken() {
        return localStorage.getItem('access_token');
    }

    // Utility function to check if user is logged in
    function isLoggedIn() {
        return Boolean(localStorage.getItem('access_token'));
    }
</script>
{% endblock %}
