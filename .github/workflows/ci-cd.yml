name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Opt-in to Node.js 24 for GitHub Actions to avoid deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libmysqlclient-dev pkg-config

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Django Tests
      env:
        SECRET_KEY: 'test-secret-key-for-ci'
        DEBUG: 'True'
        DATABASE_URL: 'sqlite:///db.sqlite3'
      run: |
        # Create staticfiles dir to silence WhiteNoise warnings during tests
        mkdir -p staticfiles
        python manage.py test

  deploy:
    name: Deploy to Render
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy Django App
      if: env.DJANGO_HOOK != ''
      env:
        DJANGO_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL_DJANGO }}
      run: |
        curl -X POST "$DJANGO_HOOK"
        
    - name: Deploy AI Service
      if: env.AI_HOOK != ''
      env:
        AI_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL_AI }}
      run: |
        curl -X POST "$AI_HOOK"

    - name: Check for Missing Secrets
      if: secrets.RENDER_DEPLOY_HOOK_URL_DJANGO == '' || secrets.RENDER_DEPLOY_HOOK_URL_AI == ''
      run: |
        echo "::warning::One or more Render Deploy Hooks are missing in GitHub Secrets. Deployment skipped."
